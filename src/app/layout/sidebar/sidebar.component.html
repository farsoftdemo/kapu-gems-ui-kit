
<button
  class="mobile-menu-btn"
  [class.is-open]="mobileSidebarOpen"
  type="button"
  [attr.aria-label]="mobileSidebarOpen ? 'Close navigation' : 'Open navigation'"
  (click)="toggleMobileSidebar()"
>

  <lucide-icon
    [img]="mobileSidebarOpen ? X : Menu"
  >
  </lucide-icon>

</button>

<button
  class="mobile-sidebar-backdrop"
  type="button"
  aria-label="Close navigation"
  *ngIf="mobileSidebarOpen"
  (click)="closeMobileSidebar()"
>
</button>

<aside
  class="sidebar"
  [class.collapsed]="isCollapsed"
   [class.mobile-open]="mobileSidebarOpen"
>

  <!-- TOP -->

  <div class="sidebar-top">

    <div class="logo">

      <span class="logo-full">
        KAPU GEMS
      </span>

      <span class="logo-mini">
        KG
      </span>

    </div>

    <button
      class="collapse-btn"
      type="button"
      aria-label="Collapse sidebar"
      (click)="toggleSidebar()"
    >

      <lucide-icon
        [img]="isCollapsed ? ChevronRight : ChevronLeft"
      >
      </lucide-icon>

    </button>

  </div>

  <!-- MENU -->

  <nav
    class="menu"
    (click)="closeMobileSidebar()"
  >

    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="LayoutDashboard"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        Dashboard
      </span>

    </a>

    <div
      class="menu-group"
      [class.open]="isSubmenuOpen('stock')"
    >

      <button
        class="menu-item submenu-trigger"
        type="button"
        (click)="openStockSearch($event)"
      >

        <lucide-icon
          [img]="Search"
          class="menu-icon"
        >
        </lucide-icon>

        <span class="menu-label">
          Stock Search
        </span>

        <lucide-icon
          [img]="ChevronDown"
          class="submenu-chevron"
        >
        </lucide-icon>

      </button>

      <div
        class="submenu"
        *ngIf="isSubmenuOpen('stock')"
      >

        <a
          [routerLink]="['/stock-search', 'certified']"
          routerLinkActive="active"
          class="submenu-item"
        >
          Certified Diamonds
        </a>

        <a
          [routerLink]="['/stock-search', 'fancy']"
          routerLinkActive="active"
          class="submenu-item"
        >
          Fancy Shapes
        </a>

        <a
          [routerLink]="['/stock-search', 'saved']"
          routerLinkActive="active"
          class="submenu-item"
        >
          Saved Searches
        </a>

      </div>

    </div>

    <div
      class="menu-group"
      [class.open]="isSubmenuOpen('earlyBird')"
    >

      <button
        class="menu-item submenu-trigger"
        type="button"
        (click)="toggleSubmenu('earlyBird', $event)"
      >

        <lucide-icon
          [img]="Sparkles"
          class="menu-icon"
        >
        </lucide-icon>

        <span class="menu-label">
          Early Bird
        </span>

        <lucide-icon
          [img]="ChevronDown"
          class="submenu-chevron"
        >
        </lucide-icon>

      </button>

      <div
        class="submenu"
        *ngIf="isSubmenuOpen('earlyBird')"
      >

        <a
          routerLink="/early-bird/search"
          routerLinkActive="active"
          class="submenu-item"
        >
          Search
        </a>

        <a
          routerLink="/early-bird/short-list"
          routerLinkActive="active"
          class="submenu-item"
        >
          Bid Short List
        </a>

        <a
          routerLink="/early-bird/my-bid"
          routerLinkActive="active"
          class="submenu-item"
        >
          My Bid
        </a>

      </div>

    </div>

    <a
      routerLink="/new-arrivals"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="Gem"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        New Arrivals
      </span>

    </a>

    <a
      routerLink="/recommended"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="HandCoins"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        Recommended
      </span>

    </a>

    <a
      routerLink="/my-request"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="ClipboardList"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        My Request
      </span>

    </a>

    <a
      routerLink="/cart"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="ShoppingCart"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        Cart
      </span>

    </a>

    <a
      routerLink="/shipment"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="Truck"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        Shipment
      </span>

    </a>

    <a
      routerLink="/tracklist"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="ClipboardList"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        TrackList
      </span>

    </a>

    <a
      routerLink="/business-policy"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="FileText"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        Business Policy
      </span>

    </a>

    <a
      routerLink="/view-demand"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="Eye"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        View Demand
      </span>

    </a>

    <div
      class="menu-group"
      [class.open]="isSubmenuOpen('purchase')"
    >

      <button
        class="menu-item submenu-trigger"
        type="button"
        (click)="toggleSubmenu('purchase', $event)"
      >

        <lucide-icon
          [img]="ShoppingBag"
          class="menu-icon"
        >
        </lucide-icon>

        <span class="menu-label">
          Purchase
        </span>

        <lucide-icon
          [img]="ChevronDown"
          class="submenu-chevron"
        >
        </lucide-icon>

      </button>

      <div
        class="submenu"
        *ngIf="isSubmenuOpen('purchase')"
      >

        <a
          routerLink="/purchase/orders"
          routerLinkActive="active"
          class="submenu-item"
        >
          Orders
        </a>

        <a
          routerLink="/purchase/invoices"
          routerLinkActive="active"
          class="submenu-item"
        >
          Invoices
        </a>

        <a
          routerLink="/purchase/payments"
          routerLinkActive="active"
          class="submenu-item"
        >
          Payments
        </a>

      </div>

    </div>

    <a
      routerLink="/edit-password"
      routerLinkActive="active"
      class="menu-item"
    >

      <lucide-icon
        [img]="KeyRound"
        class="menu-icon"
      >
      </lucide-icon>

      <span class="menu-label">
        Edit Password
      </span>

    </a>

  </nav>

</aside>
