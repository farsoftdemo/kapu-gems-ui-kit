<div class="login-wrapper">

  <div class="login-card">

    <div class="login-image">

      <div class="overlay"></div>

      <div class="image-content">

        <div class="logo-wrap">

          <div class="logo">
            KAPU GEMS
          </div>

          <div class="subtitle">
            DIGITAL BOUTIQUE EXPERIENCE
          </div>

        </div>

        <div class="welcome-text">
          Welcome to your vault.
          <br>
          Excellence. Curated for you.
        </div>

      </div>

    </div>

    <div class="login-form-section">

      <div class="form-container">

        <h1>
          Welcome back.
        </h1>

        <div class="gold-line"></div>

        <div class="form-group">

          <lucide-icon
            class="input-icon"
            [img]="Mail"
          >
          </lucide-icon>

          <input
            type="email"
            placeholder="Email Address"
          >

        </div>

        <div class="form-group">

          <lucide-icon
            class="input-icon"
            [img]="Lock"
          >
          </lucide-icon>

          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Password"
          >

          <button
            class="eye-btn"
            type="button"
            aria-label="Toggle password visibility"
            (click)="showPassword = !showPassword"
          >
            <lucide-icon [img]="Eye"></lucide-icon>
          </button>

        </div>

        <div class="remember-row">

          <label class="custom-checkbox">

            <input
              type="checkbox"
              [(ngModel)]="rememberMe"
            >

            <span class="checkmark"></span>

            <span class="checkbox-label">
              Remember me
            </span>

          </label>

          <a href="#">
            Forgot password?
          </a>

        </div>

        <button
          class="primary-btn"
          type="button"
          (click)="login()"
        >
          ENTER THE VAULT
        </button>

        <div class="divider">
          <span>or</span>
        </div>

        <button
          class="outline-btn"
          type="button"
        >

          <lucide-icon
            class="otp-icon"
            [img]="ShieldCheck"
          >
          </lucide-icon>

          LOGIN WITH OTP

        </button>

        <div class="footer-text">

          New here?

          <a href="#">
            Request access
          </a>

        </div>

      </div>

    </div>

  </div>

</div>
