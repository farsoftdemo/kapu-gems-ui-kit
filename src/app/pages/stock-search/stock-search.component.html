<section class="stock-search-page">

  <div class="search-hero">

    <div>

      <small>
        PREMIUM INVENTORY SEARCH
      </small>

      <h1>
        Stock Search
      </h1>

      <p>
        Find certified diamonds by shape, grading, measurement and commercial preferences.
      </p>

    </div>

    <div class="hero-actions">

      <button
        class="secondary-action"
        type="button"
        (click)="resetSearch()"
      >
        <lucide-icon [img]="RotateCcw">
        </lucide-icon>

        Reset
      </button>

      <button
        class="primary-action"
        type="button"
      >
        <lucide-icon [img]="Search">
        </lucide-icon>

        Search Stock
      </button>

    </div>

  </div>

  <section class="search-command-bar">

    <div class="status-control">

      <span>
        Status:
      </span>

      <button
        type="button"
        [class.active]="status === 'All'"
        (click)="status = 'All'"
      >
        All
      </button>

      <button
        type="button"
        [class.active]="status === 'New Arrival'"
        (click)="status = 'New Arrival'"
      >
        New Arrival
      </button>

    </div>

    <label class="unseen-control">
      <input
        type="checkbox"
        [(ngModel)]="unseenOnly"
      >

      Unseen
    </label>

    <div class="command-actions">

      <button
        class="secondary-action"
        type="button"
        (click)="resetSearch()"
      >
        Reset Search
      </button>

      <button
        class="primary-action"
        type="button"
      >
        <lucide-icon [img]="Search">
        </lucide-icon>

        Search
      </button>

      <button
        class="secondary-action soft"
        type="button"
      >
        Save As Demand
      </button>

      <select [(ngModel)]="demandView">
        <option value="Search Demand">Search Demand</option>
        <option value="My Demand">My Demand</option>
        <option value="Shared Demand">Shared Demand</option>
      </select>

    </div>

  </section>

  <section class="search-card">

    <div class="section-heading">

      <div>

        <small>
          STEP 01
        </small>

        <h2>
          Basic Search Details
        </h2>

      </div>

      <span>
        Multi-select tiles
      </span>

    </div>

    <div class="filter-stack">

      <div class="filter-row compact">

        <label>
          Lab
        </label>

        <div class="tile-list">

          <button
            *ngFor="let lab of labs"
            class="filter-tile"
            type="button"
            [class.selected]="isSelected('lab', lab)"
            (click)="toggleSelection('lab', lab)"
          >
            {{ lab }}
          </button>

        </div>

      </div>

      <div class="filter-row shape-row">

        <label>
          Shape
        </label>

        <div class="shape-grid">

          <button
            *ngFor="let shape of shapes"
            class="shape-tile"
            type="button"
            [class.selected]="isSelected('shape', shape.label)"
            (click)="toggleSelection('shape', shape.label)"
          >
            <svg
              class="shape-svg"
              viewBox="0 0 64 64"
              aria-hidden="true"
              [ngSwitch]="shape.iconClass"
            >
              <g *ngSwitchCase="'round'">
                <circle cx="32" cy="32" r="24"></circle>
                <path d="M32 8 18 18 8 32 18 46 32 56 46 46 56 32 46 18Z"></path>
                <path d="M18 18 32 56 46 18M8 32h48M32 8v48"></path>
              </g>

              <g *ngSwitchCase="'princess'">
                <rect x="12" y="12" width="40" height="40"></rect>
                <path d="M12 12 32 24 52 12M12 52 32 40 52 52M12 12l40 40M52 12 12 52M32 24v16"></path>
              </g>

              <g *ngSwitchCase="'cushion-mod'">
                <rect x="12" y="12" width="40" height="40" rx="11"></rect>
                <path d="M20 14 44 14 50 24 50 40 40 50 24 50 14 40 14 24Z"></path>
                <path d="M20 14 32 50 44 14M14 32h36M32 14v36"></path>
              </g>

              <g *ngSwitchCase="'cushion'">
                <rect x="13" y="13" width="38" height="38" rx="9"></rect>
                <path d="M21 13 43 13 51 32 43 51 21 51 13 32Z"></path>
                <path d="M21 13 32 51 43 13M13 32h38"></path>
              </g>

              <g *ngSwitchCase="'emerald'">
                <path d="M18 10h28l8 8v28l-8 8H18l-8-8V18Z"></path>
                <path d="M18 10v44M46 10v44M10 18h44M10 46h44M18 18h28v28H18Z"></path>
              </g>

              <g *ngSwitchCase="'sq-emerald'">
                <path d="M18 10h28l8 8v28l-8 8H18l-8-8V18Z"></path>
                <path d="M18 18h28v28H18ZM10 18l8 8M54 18l-8 8M10 46l8-8M54 46l-8-8"></path>
              </g>

              <g *ngSwitchCase="'radiant'">
                <path d="M16 10h32l6 6v32l-6 6H16l-6-6V16Z"></path>
                <path d="M16 10 32 22 48 10M16 54 32 42 48 54M10 16l44 32M54 16 10 48M32 22v20"></path>
              </g>

              <g *ngSwitchCase="'pear'">
                <path d="M32 6C19 21 12 32 12 42c0 11 9 18 20 18s20-7 20-18C52 32 45 21 32 6Z"></path>
                <path d="M32 6v54M18 31h28M16 44l16-38 16 38M20 52l12-21 12 21"></path>
              </g>

              <g *ngSwitchCase="'oval'">
                <ellipse cx="32" cy="32" rx="19" ry="27"></ellipse>
                <path d="M32 5 19 15 13 32 19 49 32 59 45 49 51 32 45 15Z"></path>
                <path d="M19 15 32 59 45 15M13 32h38M32 5v54"></path>
              </g>

              <g *ngSwitchCase="'heart'">
                <path d="M32 56C18 43 10 34 10 24c0-8 6-14 14-14 4 0 7 2 8 5 1-3 4-5 8-5 8 0 14 6 14 14 0 10-8 19-22 32Z"></path>
                <path d="M32 15v41M15 25h34M20 39l12-24 12 24"></path>
              </g>

              <g *ngSwitchCase="'marquise'">
                <path d="M6 32c9-15 18-22 26-22s17 7 26 22c-9 15-18 22-26 22S15 47 6 32Z"></path>
                <path d="M6 32h52M32 10v44M16 32l16-22 16 22-16 22Z"></path>
              </g>

              <g *ngSwitchCase="'baguette'">
                <path d="M22 8h20l6 8v32l-6 8H22l-6-8V16Z"></path>
                <path d="M22 8v48M42 8v48M16 16h32M16 48h32M22 16h20v32H22Z"></path>
              </g>

              <g *ngSwitchDefault>
                <path d="M32 6 54 20 48 50 32 58 16 50 10 20Z"></path>
                <path d="M10 20h44M16 50l16-44 16 44M20 20l12 38 12-38M32 6v52"></path>
              </g>
            </svg>

            <span>
              {{ shape.label }}
            </span>
          </button>

        </div>

      </div>

      <div class="two-column-row">

        <div class="filter-row">

          <label>
            Weight
          </label>

          <div class="range-pair">

            <input
              type="text"
              placeholder="From"
              [(ngModel)]="ranges.weight.from"
            >

            <input
              type="text"
              placeholder="To"
              [(ngModel)]="ranges.weight.to"
            >

          </div>

        </div>

        <div class="filter-row">

          <label>
            Size
          </label>

          <select [(ngModel)]="size">
            <option value="">Any size range</option>
            <option value="0.30 - 0.49">0.30 - 0.49</option>
            <option value="0.50 - 0.99">0.50 - 0.99</option>
            <option value="1.00 - 1.49">1.00 - 1.49</option>
            <option value="1.50 - 1.99">1.50 - 1.99</option>
            <option value="2.00+">2.00+</option>
          </select>

        </div>

      </div>

      <div class="filter-row">

        <label>
          Color
        </label>

        <div class="tile-list">

          <button
            *ngFor="let color of colorOptions"
            class="filter-tile"
            type="button"
            [class.selected]="isSelected('color', color)"
            (click)="toggleSelection('color', color)"
          >
            {{ color }}
          </button>

        </div>

      </div>

      <div class="filter-row">

        <label>
          Clarity
        </label>

        <div class="tile-list">

          <button
            *ngFor="let clarity of clarityOptions"
            class="filter-tile"
            type="button"
            [class.selected]="isSelected('clarity', clarity)"
            (click)="toggleSelection('clarity', clarity)"
          >
            {{ clarity }}
          </button>

        </div>

      </div>

      <div class="four-column-row">

        <div class="filter-row">

          <label>
            CPS
          </label>

          <div class="tile-list">

            <button
              *ngFor="let cps of cpsOptions"
              class="filter-tile"
              type="button"
              [class.selected]="isSelected('cps', cps)"
              (click)="toggleSelection('cps', cps)"
            >
              {{ cps }}
            </button>

          </div>

        </div>

        <div class="filter-row">

          <label>
            Cut
          </label>

          <div class="tile-list">

            <button
              *ngFor="let cut of cutOptions"
              class="filter-tile"
              type="button"
              [class.selected]="isSelected('cut', cut)"
              (click)="toggleSelection('cut', cut)"
            >
              {{ cut }}
            </button>

          </div>

        </div>

        <div class="filter-row">

          <label>
            Pol
          </label>

          <div class="tile-list">

            <button
              *ngFor="let polish of cutOptions"
              class="filter-tile"
              type="button"
              [class.selected]="isSelected('polish', polish)"
              (click)="toggleSelection('polish', polish)"
            >
              {{ polish }}
            </button>

          </div>

        </div>

        <div class="filter-row">

          <label>
            Sym
          </label>

          <div class="tile-list">

            <button
              *ngFor="let symmetry of cutOptions"
              class="filter-tile"
              type="button"
              [class.selected]="isSelected('symmetry', symmetry)"
              (click)="toggleSelection('symmetry', symmetry)"
            >
              {{ symmetry }}
            </button>

          </div>

        </div>

      </div>

      <div class="two-column-row">

        <div class="filter-row">

          <label>
            Fluor
          </label>

          <div class="tile-list">

            <button
              *ngFor="let fluor of fluorOptions"
              class="filter-tile"
              type="button"
              [class.selected]="isSelected('fluor', fluor)"
              (click)="toggleSelection('fluor', fluor)"
            >
              {{ fluor }}
            </button>

          </div>

        </div>

        <div class="filter-row">

          <label>
            Shade
          </label>

          <div class="tile-list">

            <button
              *ngFor="let shade of shadeOptions"
              class="filter-tile"
              type="button"
              [class.selected]="isSelected('shade', shade)"
              (click)="toggleSelection('shade', shade)"
            >
              {{ shade }}
            </button>

          </div>

        </div>

      </div>

      <div class="two-column-row">

        <div class="filter-row">

          <label>
            PR/CT
          </label>

          <div class="range-pair">

            <input
              type="text"
              placeholder="From"
              [(ngModel)]="ranges.price.from"
            >

            <input
              type="text"
              placeholder="To"
              [(ngModel)]="ranges.price.to"
            >

          </div>

        </div>

        <div class="filter-row">

          <label>
            Dis%
          </label>

          <div class="range-pair">

            <input
              type="text"
              placeholder="From"
              [(ngModel)]="ranges.discount.from"
            >

            <input
              type="text"
              placeholder="To"
              [(ngModel)]="ranges.discount.to"
            >

          </div>

        </div>

      </div>

    </div>

  </section>

  <section class="advanced-shell">

    <button
      class="advanced-toggle"
      type="button"
      [class.open]="advancedOpen"
      (click)="advancedOpen = !advancedOpen"
    >

      <span>
        <lucide-icon [img]="SlidersHorizontal">
        </lucide-icon>

        Advanced Search
      </span>

      <lucide-icon
        class="advanced-chevron"
        [img]="ChevronDown"
      >
      </lucide-icon>

    </button>

    <div
      class="advanced-content"
      *ngIf="advancedOpen"
    >

      <section class="search-card nested inclusion-card">

        <div class="section-heading">

          <div>

            <small>
              ADVANCED
            </small>

            <h2>
              Inclusion Details
            </h2>

          </div>

        </div>

        <div class="filter-stack">

          <div class="filter-row">
            <label>Black</label>
            <div class="tile-list">
              <button
                *ngFor="let option of blackOptions"
                class="filter-tile"
                type="button"
                [class.selected]="isSelected('black', option)"
                (click)="toggleSelection('black', option)"
              >
                {{ option }}
              </button>
            </div>
          </div>

          <div class="filter-row">
            <label>White</label>
            <div class="tile-list">
              <button
                *ngFor="let option of whiteOptions"
                class="filter-tile"
                type="button"
                [class.selected]="isSelected('white', option)"
                (click)="toggleSelection('white', option)"
              >
                {{ option }}
              </button>
            </div>
          </div>

          <div class="two-column-row">
            <div class="filter-row">
              <label>Milky</label>
              <div class="tile-list">
                <button
                  *ngFor="let option of milkyOptions"
                  class="filter-tile"
                  type="button"
                  [class.selected]="isSelected('milky', option)"
                  (click)="toggleSelection('milky', option)"
                >
                  {{ option }}
                </button>
              </div>
            </div>

            <div class="filter-row">
              <label>Eye Clean</label>
              <div class="tile-list">
                <button
                  *ngFor="let option of eyeCleanOptions"
                  class="filter-tile"
                  type="button"
                  [class.selected]="isSelected('eyeClean', option)"
                  (click)="toggleSelection('eyeClean', option)"
                >
                  {{ option }}
                </button>
              </div>
            </div>
          </div>

        </div>

      </section>

      <section class="search-card nested measurement-card">

        <div class="section-heading">

          <div>

            <small>
              ADVANCED
            </small>

            <h2>
              Measurement Details
            </h2>

          </div>

        </div>

        <div class="filter-stack">

          <div class="two-column-row">
            <div class="filter-row">
              <label>Dep%</label>
              <div class="range-pair">
                <input type="text" placeholder="From" [(ngModel)]="ranges.depth.from">
                <input type="text" placeholder="To" [(ngModel)]="ranges.depth.to">
              </div>
            </div>

            <div class="filter-row">
              <label>Tab%</label>
              <div class="range-pair">
                <input type="text" placeholder="From" [(ngModel)]="ranges.table.from">
                <input type="text" placeholder="To" [(ngModel)]="ranges.table.to">
              </div>
            </div>
          </div>

          <div class="two-column-row">
            <div class="filter-row">
              <label>MinMM</label>
              <div class="range-pair">
                <input type="text" placeholder="From" [(ngModel)]="ranges.minMM.from">
                <input type="text" placeholder="To" [(ngModel)]="ranges.minMM.to">
              </div>
            </div>

            <div class="filter-row">
              <label>MaxMM</label>
              <div class="range-pair">
                <input type="text" placeholder="From" [(ngModel)]="ranges.maxMM.from">
                <input type="text" placeholder="To" [(ngModel)]="ranges.maxMM.to">
              </div>
            </div>
          </div>

          <div class="filter-row">
            <label>Culet</label>
            <div class="tile-list">
              <button
                *ngFor="let option of culetOptions"
                class="filter-tile"
                type="button"
                [class.selected]="isSelected('culet', option)"
                (click)="toggleSelection('culet', option)"
              >
                {{ option }}
              </button>
            </div>
          </div>

          <div class="three-column-row">
            <div class="filter-row">
              <label>Cr &gt;</label>
              <div class="range-pair">
                <input type="text" placeholder="From" [(ngModel)]="ranges.crown.from">
                <input type="text" placeholder="To" [(ngModel)]="ranges.crown.to">
              </div>
            </div>

            <div class="filter-row">
              <label>Pav &gt;</label>
              <div class="range-pair">
                <input type="text" placeholder="From" [(ngModel)]="ranges.pavilion.from">
                <input type="text" placeholder="To" [(ngModel)]="ranges.pavilion.to">
              </div>
            </div>

            <div class="filter-row">
              <label>L/W</label>
              <div class="range-pair">
                <input type="text" placeholder="From" [(ngModel)]="ranges.ratio.from">
                <input type="text" placeholder="To" [(ngModel)]="ranges.ratio.to">
              </div>
            </div>
          </div>

        </div>

      </section>

      <section class="search-card nested additional-card">

        <div class="section-heading">

          <div>

            <small>
              ADVANCED
            </small>

            <h2>
              Additional Details
            </h2>

          </div>

        </div>

        <div class="filter-stack">

          <div class="two-column-row">
            <div class="filter-row">
              <label>CANADAMARK</label>
              <div class="tile-list">
                <button
                  *ngFor="let option of canadamarkOptions"
                  class="filter-tile"
                  type="button"
                  [class.selected]="isSelected('canadamark', option)"
                  (click)="toggleSelection('canadamark', option)"
                >
                  {{ option }}
                </button>
              </div>
            </div>

            <div class="filter-row">
              <label>LOC</label>
              <div class="tile-list">
                <button
                  *ngFor="let option of locationOptions"
                  class="filter-tile"
                  type="button"
                  [class.selected]="isSelected('location', option)"
                  (click)="toggleSelection('location', option)"
                >
                  {{ option }}
                </button>
              </div>
            </div>
          </div>

          <div class="two-column-row">
            <div class="filter-row">
              <label>H &amp; A</label>
              <div class="tile-list">
                <button
                  *ngFor="let option of haOptions"
                  class="filter-tile"
                  type="button"
                  [class.selected]="isSelected('ha', option)"
                  (click)="toggleSelection('ha', option)"
                >
                  {{ option }}
                </button>
              </div>
            </div>

            <div class="filter-row">
              <label>Luster</label>
              <div class="tile-list">
                <button
                  *ngFor="let option of lusterOptions"
                  class="filter-tile"
                  type="button"
                  [class.selected]="isSelected('luster', option)"
                  (click)="toggleSelection('luster', option)"
                >
                  {{ option }}
                </button>
              </div>
            </div>
          </div>

          <div class="filter-row">
            <label>TYPE IIA</label>
            <div class="tile-list">
              <button
                *ngFor="let option of typeIiaOptions"
                class="filter-tile"
                type="button"
                [class.selected]="isSelected('typeIia', option)"
                (click)="toggleSelection('typeIia', option)"
              >
                {{ option }}
              </button>
            </div>
          </div>

        </div>

      </section>

    </div>

  </section>

</section>
